<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Women's Revolt™</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,300&family=Bebas+Neue&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#000}
    #splash{position:fixed;inset:0;background:#000 url('IMG_0928.jpeg') center/cover no-repeat;cursor:pointer;display:flex;align-items:flex-end;justify-content:center;padding-bottom:48px;transition:opacity 1s}
    #splash.out{opacity:0;pointer-events:none}
    .hint{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:4px;color:rgba(255,255,255,.55);text-transform:uppercase;animation:blink 3s ease-in-out infinite}
    @keyframes blink{0%,100%{opacity:0}50%{opacity:1}}
    #main{position:fixed;inset:0;background:#080808;color:#f5f0eb;font-family:'Cormorant Garamond',serif;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;opacity:0;transition:opacity 1s .2s;overflow-y:auto}
    #main.visible{opacity:1}
    .brand{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,12vw,90px);letter-spacing:6px;color:#c0152a;line-height:1;margin-bottom:6px}
    .brand span{color:#f5f0eb}
    .sub{font-size:clamp(13px,3.5vw,18px);letter-spacing:5px;color:#c9a84c;text-transform:uppercase;margin-bottom:48px;font-style:italic}
    .tag{font-size:clamp(16px,4vw,22px);font-style:italic;color:rgba(245,240,235,.7);margin-bottom:56px;max-width:340px;line-height:1.6}
    .btns{display:flex;flex-direction:column;gap:14px;width:100%;max-width:280px;margin-bottom:56px}
    .btn{display:block;padding:16px 24px;font-family:'Cormorant Garamond',serif;font-size:15px;letter-spacing:3px;text-transform:uppercase;text-decoration:none;border:1px solid}
    .red{background:#c0152a;color:#f5f0eb;border-color:#c0152a}
    .gold{background:transparent;color:#c9a84c;border-color:#c9a84c}
    .soc{display:flex;gap:28px;margin-bottom:40px}
    .soc a{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:rgba(245,240,235,.4);text-decoration:none}
    .foot{font-size:11px;letter-spacing:2px;color:rgba(245,240,235,.2);text-transform:uppercase}
  </style>
</head>
<body>
  <div id="splash" onclick="go()"><span class="hint">touch to enter</span></div>
  <div id="main">
    <div class="brand">Women<span>'</span>s Revolt™</div>
    <div class="sub">La Rivolta delle Donne</div>
    <div class="tag">Her Silence Was The Last Warning</div>
    <div class="btns">
      <a href="https://ko-fi.com/womensrevolt" class="btn red" target="_blank">Support the Revolt</a>
      <a href="mailto:info@micronos.co.uk" class="btn gold">Contact</a>
    </div>
    <div class="soc">
      <a href="https://x.com/JamesBlackq22a" target="_blank">𝕏 Twitter</a>
      <a href="https://instagram.com/womensrevolt" target="_blank">Instagram</a>
      <a href="https://tiktok.com/@womensrevolt" target="_blank">TikTok</a>
    </div>
    <div class="foot">© 2026 Micronos Ltd · Venice, Italy</div>
  </div>
  <script>
    function go(){
      document.getElementById('splash').classList.add('out');
      setTimeout(()=>{
        document.getElementById('splash').style.display='none';
        document.getElementById('main').classList.add('visible');
      },800);
    }
  </script>
</body>
</html>
